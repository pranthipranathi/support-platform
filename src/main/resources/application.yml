spring:
  application:
    name: support-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:support_platform}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SupportPlatformPool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: support-platform-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8080

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      access-token-expiration: 86400000
      refresh-token-expiration: 604800000

ai:
  provider: mock
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o
    base-url: https://api.openai.com/v1
    max-tokens: 2000
    temperature: 0.7

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.saas.support: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{tenantId}] %-5level %logger{36} - %msg%n"

    spring:
      web:
        resources:
          static-locations: classpath:/static/
          add-mappings: true

  spring:
    mail:
      host: smtp.gmail.com
      port: 587
      username: ${MAIL_USERNAME:your-email@gmail.com}
      password: ${MAIL_PASSWORD:your-app-password}
      properties:
        mail:
          smtp:
            auth: true
            starttls:
              enable: true
              required: true
    spring:
      autoconfigure:
        exclude: org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  app:
    mail:
      from: ${MAIL_USERNAME:your-email@gmail.com}
      from-name: Support Platform